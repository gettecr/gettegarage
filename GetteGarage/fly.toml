# fly.toml app configuration file generated for gettegarage on 2026-04-17T11:47:33-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gettegarage'
primary_region = 'ewr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  ASPNETCORE_URLS = "http://+:8080"
  ConnectionStrings__GameDatabase = "Data Source=/data/gamedata.db"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "garage_data"
  destination = "/data"
